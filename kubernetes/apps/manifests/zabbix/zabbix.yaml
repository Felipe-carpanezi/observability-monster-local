apiVersion: v1
kind: Namespace
metadata:
  name: zabbix
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-server
  namespace: zabbix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-server
  template:
    metadata:
      labels:
        app: zabbix-server
    spec:
      containers:
      - name: zabbix-server
        image: zabbix/zabbix-server-pgsql:7.0-alpine-latest
        ports:
        - containerPort: 10051
        env:
        - name: DB_SERVER_HOST
          value: postgres.database.svc.cluster.local
        - name: POSTGRES_DB
          value: zabbix
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: MonsterPassword2026
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-web
  namespace: zabbix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-web
  template:
    metadata:
      labels:
        app: zabbix-web
    spec:
      containers:
      - name: zabbix-web
        image: zabbix/zabbix-web-nginx-pgsql:7.0-alpine-latest
        ports:
        - containerPort: 8080
        env:
        - name: ZBX_SERVER_HOST
          value: zabbix-server
        - name: DB_SERVER_HOST
          value: postgres.database.svc.cluster.local
        - name: POSTGRES_DB
          value: zabbix
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: MonsterPassword2026
---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-server
  namespace: zabbix
spec:
  selector:
    app: zabbix-server
  ports:
  - port: 10051
---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-web
  namespace: zabbix
spec:
  selector:
    app: zabbix-web
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zabbix-ingress
  namespace: zabbix
spec:
  ingressClassName: nginx
  rules:
  - host: zabbix.127.0.0.1.sslip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: zabbix-web
            port:
              number: 80