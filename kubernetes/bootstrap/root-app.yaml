---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    # VERIFIQUE SE ESTE LINK É O DO SEU NOVO REPO PUBLICO
    repoURL: git@github.com:Felipe-carpanezi/observability-monster-local.git
    targetRevision: main
    path: kubernetes/platform
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true