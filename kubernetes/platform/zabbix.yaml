---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zabbix
  namespace: argocd
spec:
  project: default
  source:
    chart: zabbix
    repoURL: https://zabbix.github.io/zabbix-helm-chrt
    targetRevision: 1.0.0
    helm:
      values: |
        zabbixServer:
          dbType: postgresql
          env:
            - name: DB_SERVER_HOST
              value: "monster-db.endpoint.aws.com"
            - name: POSTGRES_DB
              value: "zabbix"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "MonsterPassword2026"
        zabbixWeb:
          ingress:
            enabled: true
            annotations:
              kubernetes.io/ingress.class: nginx
            hosts:
              - host: zabbix.SUBDOMINIO.sslip.io
