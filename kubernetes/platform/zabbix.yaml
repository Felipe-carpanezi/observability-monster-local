apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zabbix
  namespace: argocd
spec:
  project: default
  source:
    chart: zabbix-helm-chrt
    repoURL: https://zabbix.github.io/zabbix-kubernetes-helm # <--- URL CORRIGIDA
    targetRevision: 1.3.4 # Versão estável compatível
    helm:
      values: |
        zabbixServer:
          dbType: postgresql
          env:
            - name: DB_SERVER_HOST
              value: "postgres.database.svc.cluster.local"
            - name: POSTGRES_DB
              value: "zabbix"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "MonsterPassword2026"
        zabbixWeb:
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - host: zabbix.127.0.0.1.sslip.io
  destination:
    server: https://kubernetes.default.svc
    namespace: zabbix
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true