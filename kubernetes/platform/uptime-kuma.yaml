apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uptime-kuma
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:Felipe-carpanezi/observability-monster-local.git
    targetRevision: main
    path: kubernetes/apps/manifests/uptime-kuma # <--- APONTA PARA A SUBPASTA
  destination:
    server: https://kubernetes.default.svc
    namespace: uptime-kuma
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true