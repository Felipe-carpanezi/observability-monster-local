apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uptime-kuma
  namespace: argocd
spec:
  project: default
  source:
    chart: uptime-kuma
    repoURL: https://dirsigler.github.io/uptime-kuma-helm
    targetRevision: 2.14.0
    helm:
      values: |
        persistence:
          enabled: false
        ingress:
          enabled: true
          ingressClassName: nginx
          hosts:
            - host: uptime.127.0.0.1.sslip.io
              paths:
                - path: /
                  pathType: Prefix
  destination:
    server: https://kubernetes.default.svc
    namespace: uptime-kuma
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true