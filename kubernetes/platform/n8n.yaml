---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n
  namespace: argocd
spec:
  project: default
  source:
    chart: n8n
    repoURL: https://8gears.github.io/n8n-helm-chart
    targetRevision: 0.20.0
    helm:
      values: |
        config:
          database:
            type: postgresdb
            postgresdb:
              host: "postgres.database.svc.cluster.local"
              database: n8n
              user: postgres
              password: "MonsterPassword2026"
        ingress:
          enabled: true
          ingressClassName: nginx
          hosts:
            - host: n8n.127.0.0.1.sslip.io
              paths:
                - path: /
                  pathType: Prefix