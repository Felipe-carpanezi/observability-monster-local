apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:Felipe-carpanezi/observability-monster-local.git
    targetRevision: main
    path: kubernetes/apps/manifests # O Argo vai ler o arquivo que você criou acima
  destination:
    server: https://kubernetes.default.svc
    namespace: n8n
  syncPolicy:
    automated:
      prune: true
      selfHeal: true