apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n
  namespace: argocd
spec:
  project: default
  source:
    chart: n8n
    repoURL: https://vshn.github.io/charts # <--- REPO MAIS ESTÁVEL
    targetRevision: 0.1.3
    helm:
      values: |
        config:
          database:
            type: postgresdb
            postgresdb:
              host: "postgres.database.svc.cluster.local"
              database: n8n
              user: postgres
              password: "MonsterPassword2026"
        ingress:
          enabled: true
          ingressClassName: nginx
          hosts:
            - host: n8n.127.0.0.1.sslip.io
  destination:
    server: https://kubernetes.default.svc
    namespace: n8n
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true